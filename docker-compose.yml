services:
  nginx:
    image: nginx:alpine
    container_name: analas_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  migrator:
    build: 
      context: .
      target: builder
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: analas_migrator
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
    command: npx prisma db push

  app:
    build: 
      context: .
      args:
        # If NPM_REGISTRY exists in .env, use it. Otherwise, use standard defaults.
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: analas_app
    env_file:
      - .env
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      clickhouse:
        condition: service_started

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_analytics
    environment:
      - CLICKHOUSE_MAX_SERVER_MEMORY_USAGE=4294967296
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-analytics_pass}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-analas_analytics}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:15-alpine
    container_name: saas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${POSTGRES_DB:-saas_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  clickhouse_data:
  postgres_data:
