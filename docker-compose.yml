services:
  app:
    build: 
      context: .
      args:
        # If NPM_REGISTRY exists in .env, use it. Otherwise, use the standard one.
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: analas_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_analytics
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:15-alpine
    container_name: saas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-saas_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  clickhouse_data:
  postgres_data:
