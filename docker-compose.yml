services:
  nginx:
    image: nginx:alpine
    container_name: analas_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  migrator:
    build:
      context: .
      target: builder
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: analas_migrator
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
    command: npx prisma db push --accept-data-loss

  app:
    build:
      context: .
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: analas_app
    env_file:
      - .env
    environment:
      # ── Recording storage ───────────────────────────────────────────────────
      # Set RECORDINGS_STORAGE=s3 in .env to use MinIO (recommended for production).
      # Leave unset or set to 'disk' to fall back to the local volume below.
      - RECORDINGS_STORAGE=${RECORDINGS_STORAGE:-disk}
      # Disk driver: directory inside the container, mapped to a named volume.
      - RECORDINGS_DIR=/recordings
      # S3 driver: internal Docker endpoint for MinIO (only used when RECORDINGS_STORAGE=s3).
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-recordings}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_FORCE_PATH_STYLE=true
    volumes:
      # Only used when RECORDINGS_STORAGE=disk (the default).
      # Safe to keep even in S3 mode — it just stays empty.
      - recordings_data:/recordings
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      clickhouse:
        condition: service_started

  # ── Prune cron ───────────────────────────────────────────────────────────────
  # Calls /api/cron/prune-recordings once an hour to delete expired and orphaned
  # recordings. Requires CRON_SECRET in .env.
  cron:
    image: alpine:3
    container_name: analas_cron
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./scripts/prune-cron.sh:/prune-cron.sh:ro
    command: sh /prune-cron.sh
    depends_on:
      - app

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  # Enable with: RECORDINGS_STORAGE=s3 in .env plus S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY.
  # Access the web console at http://<host>:9001  (remove the port mapping in production
  # and tunnel via SSH or put it behind nginx with auth).
  minio:
    image: minio/minio:latest
    container_name: analas_minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-analas_recordings}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-change_me_in_production}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9001:9001"   # MinIO console — localhost only; tunnel if needed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles:
      - s3

  # Creates the S3 bucket on first boot (idempotent — safe to run every deploy).
  minio-init:
    image: minio/mc:latest
    container_name: analas_minio_init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$S3_ACCESS_KEY_ID $$S3_SECRET_ACCESS_KEY &&
        mc mb --ignore-existing local/$$S3_BUCKET &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"
    profiles:
      - s3

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_analytics
    environment:
      - CLICKHOUSE_MAX_SERVER_MEMORY_USAGE=4294967296
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-analytics_pass}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-analas_analytics}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:15-alpine
    container_name: saas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${POSTGRES_DB:-saas_users}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  clickhouse_data:
  postgres_data:
  recordings_data:    # used by the disk driver; kept even in S3 mode for safety
  minio_data:         # used by the s3 profile (MinIO)
